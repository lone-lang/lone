name: lone

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ${{ matrix.platform.runs-on }}
    container: ${{ matrix.platform.container }}

    strategy:
      fail-fast: false

      matrix:
        platform:
          - name: x86_64
            runs-on: ubuntu-latest
            container: archlinux:base-devel

          # Official Arch Linux ships x86_64 only.
          # Arch Linux ARM is a separate community
          # project at archlinuxarm.org. Menci's
          # image tracks the Arch Linux ARM repos
          # and rebuilds daily.
          - name: aarch64
            runs-on: ubuntu-24.04-arm
            container: menci/archlinuxarm
        compiler:
          - name: cc
            env:
              CC: cc
          - name: gcc
            env:
              CC: gcc
          - name: clang
            env:
              CC: clang
        linker:
          - name: ld
            env:
              LD: ld
          - name: lld
            env:
              LD: lld
          - name: mold
            env:
              LD: mold
          - name: mold+nulls
            env:
              LD: mold
              LDFLAGS: -Wl,--spare-program-headers,2
        lto:
          - name: no-lto
            env: {}
          - name: lto
            env:
              LTO: "yes"
        stack-protector:
          - name: no-stack-protector
            env: {}
          - name: stack-protector
            env:
              STACK_PROTECTOR: "yes"

        # GCC with LTO emits its own IR in .gnu.lto_* sections.
        # LLD only consumes LLVM bitcode and ignores GCC's IR.
        # When combined with GCC and LTO, the result is an empty
        # .text and a binary with no entry point. The LTO plugin
        # path does not help because LLD will not load GCC's plugin.
        # Using -ffat-lto-objects would result in no actual LTO
        # being performed, hiding rather than solving the problem.
        # The combination is a known upstream incompatibility.
        # Clang+LLD+LTO and GCC+{ld,mold}+LTO both still run
        # and cover the LTO surface this would have tested.
        exclude:
          - compiler:
              name: cc
            linker:
              name: lld
            lto:
              name: lto
          - compiler:
              name: gcc
            linker:
              name: lld
            lto:
              name: lto

    env:
      CONFIGURATION: ${{ matrix.platform.name }}+${{ matrix.compiler.name }}+${{ matrix.linker.name }}+${{ matrix.lto.name }}+${{ matrix.stack-protector.name }}
      CC: ${{ matrix.compiler.env.CC }}
      LD: ${{ matrix.linker.env.LD }}
      CFLAGS: ${{ matrix.compiler.env.CFLAGS }}
      LDFLAGS: ${{ matrix.linker.env.LDFLAGS }}
      LTO: ${{ matrix.lto.env.LTO }}
      STACK_PROTECTOR: ${{ matrix.stack-protector.env.STACK_PROTECTOR }}

    name: ${{ matrix.platform.name }} / ${{ matrix.compiler.name }} / ${{ matrix.linker.name }} / ${{ matrix.lto.name }} / ${{ matrix.stack-protector.name }}

    steps:
    - name: Set up pacman keys
      run: pacman-key --init

    - name: Update packages and install dependencies
      run: pacman -Syu --noconfirm base-devel clang lld llvm mold

    - name: Checkout lone repository
      uses: actions/checkout@v4

    - name: Build lone
      run: make --jobs --output-sync lone

    - name: Upload lone interpreter artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.platform.name }}+${{ matrix.compiler.name }}+${{ matrix.linker.name }}+${{ matrix.lto.name }}+${{ matrix.stack-protector.name }}
        path: build/${{ matrix.platform.name }}+${{ matrix.compiler.name }}+${{ matrix.linker.name }}+${{ matrix.lto.name }}+${{ matrix.stack-protector.name }}/lone
        compression-level: 9
        overwrite: false

    - name: Build lone's tools
      run: make --jobs --output-sync tools

    - name: Build lone's test suite
      run: make --jobs --output-sync tests

    - name: Test lone
      run: make test

  analyze:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    container: archlinux:base-devel

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'cpp' ]

    steps:
    - name: Set up pacman keys
      run: pacman-key --init

    - name: Update packages and install dependencies
      run: pacman -Syu --noconfirm base-devel clang lld llvm mold

    - name: Checkout lone repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}

    - name: Build lone
      run: make

    - name: Perform CodeQL analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
